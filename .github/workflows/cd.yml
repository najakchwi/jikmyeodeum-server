name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        run: ./gradlew test

      - name: Build jar
        run: ./gradlew bootJar

      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep "^version" build.gradle | sed -E "s/version = '(.*)'/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Locate built jar
        id: jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "No boot jar found in build/libs"
            exit 1
          fi
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker build context
        run: |
          mkdir -p build/docker
          cp "${{ steps.jar.outputs.path }}" build/docker/app.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: build/docker
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_IMAGE }}:latest

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8080/actuator/health; then
                exit 0
              fi
              sleep 3
            done
            echo "Health check failed"
            exit 1
