name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download jar artifact from CI run
        uses: actions/download-artifact@v8.0.1
        with:
          name: app-jar
          path: build/libs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep "^version" build.gradle | sed -E "s/version = '(.*)'/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Locate built jar
        id: jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "No boot jar found in build/libs"
            exit 1
          fi
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy artifact
        run: |
          mkdir -p build/deploy
          cp "${{ steps.jar.outputs.path }}" build/deploy/app.jar.new

      - name: Upload jar to Lightsail
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: build/deploy/app.jar.new
          target: /opt/jikmyeodeum-server
          strip_components: 2

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            mv /opt/jikmyeodeum-server/app.jar.new /opt/jikmyeodeum-server/app.jar
            sudo systemctl restart jikmyeodeum-server

      - name: Health check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8080/actuator/health; then
                exit 0
              fi
              sleep 3
            done
            echo "Health check failed"
            exit 1
