spring:
  application:
    name: server
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    baseline-on-migrate: false

app:
  server:
    url: ${SERVER_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 3600
    refresh-token-expiration: 2592000
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}
    app-key: ${KAKAO_APP_KEY}
    jwks-uri: ${KAKAO_JWKS_URI:https://kauth.kakao.com/.well-known/jwks.json}
    issuer: ${KAKAO_ISSUER:https://kauth.kakao.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    jwks-uri: ${GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
    issuer: ${GOOGLE_ISSUER:https://accounts.google.com}
  solapi:
    api-key: ${SOLAPI_API_KEY:}
    secret-key: ${SOLAPI_SECRET_KEY:}
    from-number: ${SOLAPI_FROM_NUMBER:}
  r2:
    account-id: ${R2_ACCOUNT_ID}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket: ${R2_BUCKET}
    public-base-url: ${R2_PUBLIC_BASE_URL}

springdoc:
  api-docs:
    path: /api/api-specs
  use-fqn: false
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    urls-primary-name: general

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

matching:
  minimum-score: 60
  weights:
    trust: 20
    team: 40
    watchStyle: 20
    personality: 10
    distance: 10
