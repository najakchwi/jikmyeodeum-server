spring:
  application:
    name: server
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    baseline-on-migrate: false
    # DB 히스토리에만 남고 로컬 locations엔 없는 seed(예: seed/dev 미포함 프로파일) 마이그레이션을
    # validate 실패시키지 않고 무시한다.
    ignore-migration-patterns: "*:missing"

app:
  server:
    url: ${SERVER_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 3600
    refresh-token-expiration: 2592000
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}
    app-key: ${KAKAO_APP_KEY}
    jwks-uri: ${KAKAO_JWKS_URI:https://kauth.kakao.com/.well-known/jwks.json}
    issuer: ${KAKAO_ISSUER:https://kauth.kakao.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    jwks-uri: ${GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
    issuer: ${GOOGLE_ISSUER:https://accounts.google.com}
  solapi:
    api-key: ${SOLAPI_API_KEY:}
    secret-key: ${SOLAPI_SECRET_KEY:}
    from-number: ${SOLAPI_FROM_NUMBER:}
  r2:
    account-id: ${R2_ACCOUNT_ID}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket: ${R2_BUCKET}
    public-base-url: ${R2_PUBLIC_BASE_URL}
  discord:
    debounce-ttl: ${DISCORD_ALERT_DEBOUNCE_TTL:PT15M}
    webhooks:
      critical: ${DISCORD_WEBHOOK_CRITICAL:}
      warning: ${DISCORD_WEBHOOK_WARNING:}
      info: ${DISCORD_WEBHOOK_INFO:}
      metrics: ${DISCORD_WEBHOOK_METRICS:}
  alert:
    health:
      down-threshold: ${ALERT_HEALTH_DOWN_THRESHOLD:3}
      check-rate-ms: ${ALERT_HEALTH_CHECK_RATE_MS:60000}
    matching:
      match-rate-warning-threshold: ${ALERT_MATCH_RATE_WARNING_THRESHOLD:0.4}
      deadman-grace: ${ALERT_MATCHING_DEADMAN_GRACE:PT30M}
    external:
      window: ${ALERT_EXTERNAL_WINDOW:PT5M}
      failure-rate-threshold: ${ALERT_EXTERNAL_FAILURE_RATE_THRESHOLD:0.1}
      check-rate-ms: ${ALERT_EXTERNAL_CHECK_RATE_MS:60000}
    metrics:
      heap-threshold: ${ALERT_METRICS_HEAP_THRESHOLD:0.85}
      system-threshold: ${ALERT_METRICS_SYSTEM_THRESHOLD:0.85}
      hikari-threshold: ${ALERT_METRICS_HIKARI_THRESHOLD:0.9}
      swap-threshold: ${ALERT_METRICS_SWAP_THRESHOLD:0.1}
      disk-threshold: ${ALERT_METRICS_DISK_THRESHOLD:0.8}
      gc-pause-warning-ms: ${ALERT_METRICS_GC_PAUSE_WARNING_MS:1000}
      latency-p99-warning-ms: ${ALERT_METRICS_LATENCY_P99_WARNING_MS:3000}
      check-rate-ms: ${ALERT_METRICS_CHECK_RATE_MS:60000}
    safety:
      window: ${ALERT_SAFETY_WINDOW:PT1H}
      critical-threshold: ${ALERT_SAFETY_CRITICAL_THRESHOLD:10}
    sms:
      window: ${ALERT_SMS_WINDOW:PT1H}
      sent-warning-threshold: ${ALERT_SMS_SENT_WARNING_THRESHOLD:100}
      blocked-warning-threshold: ${ALERT_SMS_BLOCKED_WARNING_THRESHOLD:20}
    business:
      check-rate-ms: ${ALERT_BUSINESS_CHECK_RATE_MS:60000}
      daily-digest-cron: ${ALERT_BUSINESS_DAILY_DIGEST_CRON:0 0 10 * * *}

springdoc:
  api-docs:
    path: /api/api-specs
  use-fqn: false
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    # 실제 정적 리소스는 항상 "{path 상위 경로}/swagger-ui/index.html"에 마운트된다(springdoc 하드코딩).
    # 최종 사용자 노출 URL(/api/docs)은 SwaggerDocsController가 별도로 서빙한다.
    path: /api/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    urls-primary-name: general

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    enable:
      all: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.99

matching:
  # 전면 소프트 매칭 전환에 맞춰 하향. 초기 매칭률을 보며 운영에서 조정한다.
  minimum-score: 45
  weights:
    trust: 12
    gender: 15
    team: 13
    distance: 10
    smoking: 8
    watchStyle: 7
    drinking: 6
    fanLevel: 6
    personality: 6
    age: 5
    seat: 4
    talk: 4
    meetPurpose: 4
